name: Sync to Hugging Face Hub
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - uses: huggingface/hub-sync@v0.1.0
        with:
          github_repo_id: khadeejahkhurram09/Study-App
          huggingface_repo_id: scholarwave-studios/scholarwave-hub
          hf_token: ${{ secrets.HF_TOKEN }}